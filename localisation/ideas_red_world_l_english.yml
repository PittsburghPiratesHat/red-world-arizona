 idea_eu_member:0 "European Union Member"
 idea_eu_member_desc:0 "This country is a member state of the European Union of Socialist Republics, a political and economic union of European countries. Established in 1985, the European Union is an intergovernmental organization with its own government and parliament that together with its member states uphold common laws and coordinate economic planning."
 idea_eu_observer:0 "Agreement on the European Economic Area Member"
 idea_eu_observer_desc:0 "This country is a member state of the Agreement on the European Economic Area, a group of states loosely tied to the European Union of Socialist Republics. Gaining access to the European single market, these countries are not bound by the European partnership, nor are they committed to political integration."
 idea_comecon_member:0 "Comecon Member"
 idea_comecon_member_desc:0 "This country is an observer state of the Council for Mutual Economic Assistance, an economic union centered around the Soviet Union. Originally founded in an effort to integrate the economies of Eastern Europe and establish a method for transnational central planning, Comecon has since expanded into a global trade organization connecting both socialist and non-socialist countries.. Full membership gives greater access to the Comecon market, but also allows the Soviet Union to exert more influence over the economy of member states."
 idea_comecon_cooperant:0 "Comecon Cooperant"
 idea_comecon_cooperant_desc:0 "This country is an observer state of the Council for Mutual Economic Assistance, an economic union centered around the Soviet Union. Originally founded in an effort to integrate the economies of Eastern Europe and establish a method for transnational central planning, Comecon has since expanded into a global trade organization connecting both socialist and non-socialist countries. Cooperant status allows representation at the organization through government officials and business leaders, and access to the Comecon market, but further integration is only possible for states with centrally planned economies."
 idea_comecon_observer:0 "Comecon Observer"
 idea_comecon_observer_desc:0 "This country is an observer state of the Council for Mutual Economic Assistance, an economic union centered around the Soviet Union. Originally founded in an effort to integrate the economies of Eastern Europe and establish a method for transnational central planning, Comecon has since expanded into a global trade organization connecting both socialist and non-socialist countries. Observer status allows no direct access to the Comecon market, but participation in Comecon committees can advance the economic interests of observers."
