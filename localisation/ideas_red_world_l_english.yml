 idea_raj_hindu_rate_of_growth:0 "Hindu Rate of Growth"
 idea_raj_hindu_rate_of_growth_desc:0 "The ‘Hindu rate of growth’ is a term coined by advocates of liberalization in India. Since independence the Indian economy has experienced slow economic growth compared to our immediate neighbours, and much lower growth than countries like Japan or Singapore. The slow rate of growth is often blamed on the ‘License Raj’, a system of strict government control and regulation of the economy. Calls to reform this system have been growing louder, and it seems only a matter of time before the situation becomes untenable."
