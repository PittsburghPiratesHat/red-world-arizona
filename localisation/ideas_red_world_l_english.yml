 idea_usa_flight_of_the_executives:0 "Flight of the Executives"
 idea_usa_flight_of_the_executives_desc:0 "The South was never the most prosperous part of the United States, and with the economic collapse that followed the breakup of the US it was left a shadow of its former self. Most leaders of industry left the country for Canada and their factories were left to rust. Now few see any reason to invest in our nation, leaving the economy stagnant and unproductive."
 idea_usa_international_stigma:0 "International Stigma"
 idea_usa_international_stigma_desc:0 "After the collapse of the United States proper, the victorious Soviet Union and the United Nations have decided to recognize the Union of American People’s Republics as the rightful claimants to the territory that once belonged to the USA. Meanwhile, the American Republic enjoys national recognition from but a few like-minded nations. These circumstances make diplomacy and international trade difficult."
