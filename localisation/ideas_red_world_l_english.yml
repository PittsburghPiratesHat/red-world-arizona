 idea_failing_economy:0 "Failing Economy"
 idea_failing_economy_desc:0 "Though the Pacific states were once some of the most prosperous in the old United States, they suffered greatly during the upheavals of the Great American Collapse. Despite many initiatives by the Davis government to reinvigorate the economy by focusing on urban industrial expansion, most of the economy still lags behind the developed world as international trade remains uneven and many assets are indirectly controlled by Soviet State Corporations."
 idea_pca_immigration:0 "Immigration Issues"
 idea_pca_immigration_desc:0 "The UAPR has been hit by a wave of immigrants fleeing the conflicts in Central America. Despite the best efforts of our government to enforce our immigration laws and assure the ideological correctness of those who enter the country, many have been slipping through the cracks, showcasing the need for greater precautions to prevent reactionary infiltration."
