 idea_lba_gaddafis_fine_line_desc:1 "Although no one would dare say it openly, the Great Leader's reign is far from absolute. Political dissidents, ambitious generals, religious fanatics and more all threaten to destroy the dream of an Arab Islamic Republic from the inside. Colonel Gaddafi is walking a fine line to keep the country together, but sooner or later a reckoning must come..."
 idea_gau_war_between_states:0 "War Between the States"
 idea_gau_war_between_states_desc:0 "Chairman Sanders, in his inauguration speech, has declared war on the festering remnants of the former Federal government. We expect a swift victory over the traitors against the people."
 idea_usa_war_between_states:0 "War Between the States"
 idea_usa_war_between_states_desc:0 "The madman Sanders has ordered the immediate invasion of our great Republic. We are outnumbered and outgunned, but our spirit is mighty. We will never surrender!"
 idea_america_neutrality:0 "American Isolation"
 idea_america_neutrality_desc:0 "Our government is a successor to the former United States, and as such claims rightful sovereignty over some or all former American territory. Though a noble goal in our eyes, our stance prevents us from forming meaningful diplomatic relations, as no country wants to risk becoming closely involved in a major conflict on American soil."
 idea_america_neutrality_tt:0 "§RWe will be unable to join or create factions until we reunite America or abandon our claims altogether.§!"
 idea_america_neutrality_statelet:0 "American Isolation"
 idea_america_neutrality_statelet_desc:0 "Our government is a breakaway state of the former United States, with no desire to unify America or support a unifying force. Though we are internationally recognized, our stance of self-determination and neutrality in a continent of political heavyweights has resulted in severe diplomatic isolation."
 idea_america_neutrality_statelet_tt:0 "§RWe will be unable to join or create factions, unless done through our focus tree.§!"
 player_remove_neutrality:0 "Allow International Diplomacy"
 idea_prc_legacy_of_maoism:0 "Legacy of the Cultural Revolution"
 idea_prc_legacy_of_maoism_desc:0 "The Great Proletarian Cultural Revolution, introduced in order to purge Chinese society of capitalist and traditional elements, has come to define almost every aspect of modern Chinese life. First initiated by Mao Zedong but ultimately carried out during the rule of the so-called ‘Gang of Four’, the Cultural Revolution upended centuries of Chinese culture and customs. Though the violent period of the revolution is long behind us, its effects can still be felt today and the norms it established still dictate everything from the highest political leadership all the way down to simple family life."
 idea_prc_antiquated_military:0 "Antiquated Military"
 idea_prc_antiquated_military_desc:0 "The People’s Liberation Army has drastically fallen behind its East Asian counterparts. Military doctrine remains firmly rooted in Mao Zedong’s strategy of the ‘people’s war’ while the Maoist insistence on national self-reliance have left us unable to import foreign technology, leading detractors to dub our military a ‘guerilla army with nuclear weapons’. The political role of military leadership has also led many to fear that should the party split along factional lines the military will split with it. Modernization is desperately needed."
 idea_prc_reform_and_opening:0 "Reform and Opening"
 idea_prc_reform_and_opening_desc:0 "The policy of ‘Reform and Opening’ was officially adopted by the 17th National Congress of the Chinese Communist Party in 2007. Championed by Maoists and reformists alike, it is a desperate attempt by the political leadership to undo decades of economic stagnation and mismanagement while maintaining the principles of Mao Zedong. The reforms have begun to open up China to foreign trade and investment, as well as introducing small elements of market forces and decentralization."
