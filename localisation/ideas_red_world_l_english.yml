 idea_effects_of_the_khmer_rouge:0 "Effects of the Khmer Rouge"
 idea_effects_of_the_khmer_rouge_desc:0 "The Khmer Rouge dictatorship has left a lasting mark on Kampuchea, both economically, environmentally and socially. It will take significant efforts to bring this country out of the past."
 idea_standing_firm_union:0 "Standing Firm"
 idea_standing_firm_union_desc:0 "While the United States may have broken apart, we stand as its rightful successors. With the backing of the Soviet Union and the international community, the reunification of the states under the red banner is inevitable."
 idea_standing_firm_commonwealth:0 "Standing Firm"
 idea_standing_firm_commonwealth_desc:0 "We have emerged from the fallout of the breakup of the United States in the Second American Revolution. We intend to reunite these broken States as a truly free and equal successor to the old USA, despite opposition from reactionary southerners or false socialists."
 idea_standing_firm_remnants:0 "Standing Firm"
 idea_standing_firm_remnants_desc:0 "While the United States may have broken apart due to traitorous interference, its spirit has not been defeated. The American Republic still stands, as the remnants of and rightful successors to the USA."
 idea_cascadian_separatism:0 "Cascadian Seperatism"
 idea_cascadian_separatism_desc:0 "The Cascadian independence movement has long been an obstacle to the unity of our republics. This reactionary movement seeks the separation of the Columbian People’s Republic from the rest of the union, and in recent years they have grown increasingly popular among rural northerners and ideological deviants."
 idea_capitalism_with_indian_characteristics:0 "Capitalism With Indian Characteristics"
 idea_queen_elizabeth_ii:0 "Queen Elizabeth II"
 idea_queen_elizabeth_ii_desc:0 "Elizabeth the Second is Queen of the United Kingdom."
 idea_rama_ix:0 "Rama IX"
 idea_rama_ix_desc:0 "Bhumibol Adulyadej is King of Thailand."
 idea_jap_akihito:0 "Akihito"
 idea_jap_akihito_desc:0 "Akihito is Emperor of Japan. Extremely popular, he is a force of unity and stability for the nation."
 idea_carl_xvi_gustaf:0 "Carl XVI Gustaf"
 idea_carl_xvi_gustaf_desc:0 "Carl XVI Gustaf is King of the Kingdom of Sweden."
 idea_swe_peoples_defense:0 "People's Defense"
 idea_soviet_stagnating_economy:0 "Stagnating Economy"
 idea_bastion_of_european_democracy:0 "Bastion of European Democracy"
 idea_bastion_of_european_democracy_desc:0 "The British Isles are the last bastions of European democracy. We must protect ourselves from the Communist threat."
 idea_soviet_rampant_corruption:0 "Rampant Corruption"
 idea_shield_and_sword:0 "Shield and Sword of the Party"
 idea_shield_and_sword_desc:0 "The Stasi is the state security of Germany. Its  most important task is protecting our people from foreign influences, especially capitalism and reactionism. It is also responsible for espionage and counterintelligence."
 idea_comrade_general:0 "Comrade General"
 idea_comrade_general_desc:0 "General Jaruzelski is Marshall of People's Army and leader of the Polish military government that guided us through crisis. Despite his age, the General is still willing to serve our Motherland the best way he can."
 idea_arg_interventionist_military:0 "Interventionist Military"
 idea_arg_interventionist_military_desc:0 "The Argentine Armed Forces wield considerable political influence in the country. The military’s support can make or break a government, as it did several times from the 1950s-1970s in order to keep Juan Perón and his supporters out of power. Likewise the subsequent Peronist dictatorship and its fall in a popular revolution would’ve been impossible without the military’s approval. Any attempt by the government to move against the military would be met with bitter, even deadly resistance."
 idea_argentine_paradox:0 "Argentine Paradox"
 idea_argentine_paradox_desc:0 "Once one of the most advanced economies in the world, Argentina’s development has now fallen behind its South American neighbors. The country has been plagued by political instability from the 1930s until the modern day, with inflation, government spending and foreign debt growing exponentially. Now as an economic crisis is unfolding across the continent it seems increasingly likely that the whole system might come crashing down."
 idea_peronist_old_guard:0 "Peronist Old Guard"
 idea_peronist_old_guard_desc:0 "Although General Juan Perón has been dead since 1967, his legacy lives on. His party, the Justicialist Party, ran the country from the end of the military dictatorship in 1973 until the Revolución Democratica in 1997, and they continue to control vital institutions such as unions, governorships and the Senate."
