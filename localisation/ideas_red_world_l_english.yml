 idea_ari_water_crisis:0 "Water Crisis"
 idea_ari_water_crisis_desc:0 "Arizona has a crippling water crisis due to being in the desert and all nearby sources of water controlled by other nations."
  idea_ari_exiles:0 "Exiles From Other American States"
 idea_ari_exiles_desc:0 "Arizona took in a massive amount of exiles being one of the few post disollution nations with no clear national identity"
  idea_ari_divided_politics:0 "Divided Politics"
 idea_ari_divided_politics_desc:0 "Arizona is one of the most politically divided post disillution nations with it's own communist branch, the rapidly violent and xenophobic border patrol, and what few traditional American politicans have been able to stay."
  idea_ari_divided_identity:0 "Divided Identity"
 idea_ari_divided_identity_desc:0 "Arizona has no clear national identity, is it a true post disollution American successor? It's own desert nation? Who knows."
  idea_ari_circling_vultures:0 "Circling Vultures"
 idea_ari_circling_vultures_desc:0 "Arizona is surrounded by more powerful nations from Mexico to it's south and east, the UAPR from it's west, and Utah to the north, all far more powerful and with much stronger identitites and militaries."
  idea_ari_barely_any_military:0 "The Arizonan Military"
 idea_ari_barely_any_military_desc:0 "The military of Arizona if you can even call it a military is little more than a few pre national guard units, the waveringly loyal and power hungry border patrol, and law enforcement none of which answer to the same high command or are a cohesive fighting force on their own"