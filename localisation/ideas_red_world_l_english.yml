 YEM_civil_war: "The Yemeni Civil War"
 YEM_civil_war_desc: "§RCannot create or join factions!§R"
 YEM_south_war: "Southern Guerrilla War"
 YEM_south_war_desc: "In the east of our country, far from the capital of Sana'a, the remnants of the Socialists are still around. Waging a war of resistance from the villages and towns of the region, they have proven unreasonably tenacious. Despite the best efforts of our armed forces, we have been unable to dislodge them completely, and to this day they remain a thorn in our side. While they are contained now, further measures must be taken to stop the Socialists for good."
 YEM_war: "Memories of the Civil War"
 YEM_war_desc: "Our country has suffered so much over the last few decades, with division and radicalism run amock, wrecking havoc upon our country. The wounds of the latest civil war still run fresh, and those wounds have yet to heal. Time mends them all, however, so we have to keep a stable hand on the wheel until the people have moved past the tragic events past us."
 idea_yug_brotherhood_and_unity:0 "Broken Brotherhood"
 idea_yug_brotherhood_and_unity_desc:0 "Since the foundation of Socialist Yugoslavia in 1945, its motto has been ‘Brotherhood and Unity’. While supposed to embody the fraternity of all Southern Slavs, in truth it represents a complicated series of policies, norms and quotas designed to promote harmony between the six nationalities of the federation. Faith in these policies have been in decline since the death of Marshal Tito and there is no telling if or when ethnic disputes will flare up again."
 idea_yug_yugoslav_model:0 "Yugoslav Model"
 idea_yug_yugoslav_model_desc:0 "The Yugoslav model of socialist economic planning is based on the principle of workers’ self-management, allowing employees to choose their own managers through a form of workplace democracy. Only key sectors of the economy are subject to state planning, while most companies allow their managers to set quotas to respond to market demands. Even small private businesses are allowed. This unique economy has long struggled with high unemployment, deficits and uncompetitiveness."
 idea_heisei_system:0 "Heisei System"
 idea_heisei_system_desc:0 "The Heisei System, named after the Heisei Era of Japan, defines Japanese politics in the 21st century. Established after the fall of the United States and the death of Emperor Showa in the late 1980s, the system is defined by the complete dominance of the Liberal Democratic Party in national elections and increasing factionalism within the government. The ties formed between politicians, business and the Yakuza have intertwined the state so deeply with corporations and the criminal underworld that it is tough to separate them from each other."
 idea_sunrise_economy:0 "Sunrise Economy"
 idea_sunrise_economy_desc:0 "The Japanese economy is one of the largest and most advanced economies in the world. Arising from the ashes of the Second World War, Japanese economic growth was defined by the collaboration between the state and business, local dependency on government loans and the role of the keiretsu, large business conglomerates. Organized crime has grown since the economic crisis caused by the collapse of the United States, but the Japanese economy has since recovered by refocusing its economy towards domestic consumption and deeper trade relations with its closest allies, leading to the entrenchment of the prevailing business elite."
 idea_hatoyama_doctrine:0 "Hatoyama Doctrine"
 idea_hatoyama_doctrine_desc:0 "The Hatoyama Doctrine is a strategy adopted by Japan following the American defeat in the Korean War, and continues to define Japanese defense policy in the 21st century. Named after Prime Minister Ichiro Hatoyama, in accordance with the doctrine Japan has prioritized its national defense, easing its reliance on the United States for security and abolishing Article 9 of the Japanese constitution. Increased defense spending and high economic growth has allowed Japan to build one of the world’s most advanced militaries, who stand on guard against any threat to the islands."
 idea_chi_remnants_of_the_pacific_fleet:0 "Remnants of the Pacific Fleet"
 idea_chi_remnants_of_the_pacific_fleet_desc:0 "In the aftermath of America's collapse, most of the Pacific Fleet defected to Taiwan. Although the nation is blessed to have such powerful defenders against communist aggression, the cost of maintaining a navy this large proves to be more than Taiwan's economy can reasonably handle."
 idea_east_african_community:0 "East African Community Member"
 idea_east_african_community_desc:0 "This country is a member of the East African Community, an intergovernmental organization working for the political and economic integration of several East African states. First established in 1967, the original EAC collapsed in 1977. It was reestablished in 1999 and expanded into a customs union, with the eventual goal of establishing a common market, currency and even a political federation. "
 idea_ASEAN:0 "ASEAN Member"
 idea_ASEAN_desc:0 "This country is a member of the Association of Southeast Asian Nations, a political and economic union of Southeast Asian states. Established in 1967, the organization promotes intergovernmental cooperation and integration between its member states through the ASEAN Charter and the ASEAN Free Trade Area, and it is considered a bulwark against the expansion of communism in Southeast Asia."
 idea_DEN_headache:0 "The Holmsgaard Headache"
 idea_DEN_headache_desc:0 "President Anne Grete Holmsgaard seemed like a shoo-in when she was elected in 2001, having served diligently in the party for decades. But what the party hadn't expected was for a certain skeleton in her closet to reemerge. In recent years, President Holmsgaard has begun taking an overtly hostile stance towards the Jewish community of Denmark, giving antisemitism a platform in a country that thought it had marginalized it long ago. This stance has made Holmsgaard an unpopular figure within her own party, which spends much time and effort condemning her views. What is worse than just infighting is that her rhetoric has begun to legitimize certain groups on the far right."
 idea_DEN_reform_policy:0 "Reform Policy"
 idea_DEN_reform_policy_desc:0 "Referring to a policy adopted at the 11th Congress of the Left Socialists in 1980, the Reform Policy is the cornerstone of their decades-long governance. Lining out a series of policy proposals intended to 'empower the working class', the Reform Policy saw large swathes of the economy be brought under state control, and has ensured economic growth and stability ever since. However, the policy is segmented into two areas, the short term goals and the long term goals, with few of the latter having been fulfilled 30 years after its adoption. In recent years this has caused increasing consternation both within and without the party, and many are calling for a continuation of the reforms, elsewise a reversal of them."
 idea_DEN_red_europe:0 "Red Europe Dispute"
 idea_DEN_red_europe_desc:0 "A convoluted compromise adopted by the Left Socialists for a European policy, the Red Europe Policy states that Denmark should only join an explicitly socialist European Union. Having been used to justify Denmark leaving the union once, the Holmsgaard government has instead begun using it as a justification for rejoining the EUSR, already being in consultative talks with both Brussels and leading European governments. This interpretation is not universally accepted, and many within the governing party remain opposed to any reconciliation with the union. A resolution to this dispute must be found for Denmark to clarify its European policy."
 idea_POR_politicised_military:0 "Politicized Military"
 idea_POR_politicised_military_desc:0 "The Portuguese Armed Forces is often considered to be the most powerful institution in the country. Headed by officers ideologically descended from the Armed Forces Movement that led the Carnation Revolution, the military has been enshrined as the ‘protectors of the revolution’ and the guardians of the constitutional order, and have often used this authority to meddle with Portugal’s civilian governments."
 idea_POR_restrictive_economy:0 "Restrictive Economy"
 idea_POR_restrictive_economy_desc:0 "As part of the constitutional reforms following the Carnation Revolution, Portugal has committed itself to ‘ensure the transition to socialism’. Rejecting the Leninist concept of central planning, the Portuguese economy is supervised by Workers’ Committees who represent their members in both the public and private sectors, ensuring the rights and happiness of the workers. However this system also severely restricts foreign and private investment, which has curtailed economic growth and productivity."
 idea_andean_community:0 "Andean Pact Member"
 idea_andean_community_desc:0 "This country is a member of the Andean Pact, a free trade community of South American states. Established in 1969 with the goal of creating a customs union and eventually a common market, political differences between member states has led the organization to mostly be reduced to a discussion forum through the Andean Parliament and Court of Justice."
 idea_NOR_soviet_democracy:0 "Soviet Democracy"
 idea_NOR_soviet_democracy_desc:0 "Established in 1988, the Norwegian political system is based on a distorted form of Soviet Democracy. Nominally a form of bottom-up governance, where local municipalities elect the representatives who in turn select the government in a multi-party democracy, in practice it allows the Red Alliance, who control almost all municipalities, to run the country without much opposition."
 idea_NOR_state_of_mind:0 "State of Mind"
 idea_NOR_state_of_mind_desc:0 "Øystein Meier Johannessen has been president of Norway since 1997, previously serving as prime minister from 1992. Though widely popular in the Red Alliance for his conception of the 1988 electoral law, his authoritarian leadership has increasingly put him at odds with his own party, who see his erratic and arbitrary behavior as a sign of his worsening mental state."
 idea_NOR_land_of_luck:0 "Land of Luck"
 idea_NOR_land_of_luck_desc:0 "Ever since the discovery of oil and natural gas in the Norwegian section of the North Sea in 1969, Norway has eagerly promoted the development of its energy sector. Despite most foreign investors pulling out during the late eighties, Norway has asserted its rights to the resource through its state-owned energy companies Statoil and Norsk Hydro. Fossil fuels now account for a majority of the country’s exports and much of its revenues are reinvested in the country through the Government Pension Fund, which holds a stake in large parts of the economy."
 idea_BOL_andes_chasm:0 "The Andes Chasm"
 idea_BOL_andes_chasm_desc:0 "Bolivia is a divided country. While the rural lowlands are supportive of Medinaceli's socialist government, opposition has been mounting, both in the highlands and urban areas. Major cities such as Santa Cruz, inhabited by the educated middle and upper classes, have seen large wealth transfers to the rural poor during Bolivian socialism, while the majority indigenous highlands feel neglected by the mostly mestizo government. Resentment has grown everywhere, and with Medinaceli's deteriorating popularity, open protests and riots have begun to rock Bolivia's cities, with activists calling for an end to the ‘tyrannical government’."
 idea_BOL_native_unrest:0 "Indigenous Unrest"
 idea_BOL_native_unrest_desc:0 "Despite the promises of equality under socialism, Bolivia is still overwhelmingly dominated politically by its white and mestizo populations, both minority groups in the country. In recent years native demands for equality and enfranchisement have only grown, with indigenous groups budding both within the government and without. These are however derided by many in the lowlands as no more than ‘native fundamentalism’, and thus fiercely resisted, even by some government officials."
 idea_BOL_antofagasta_lease:0 "Treaty of Antofagasta"
 idea_BOL_antofagasta_lease_desc:0 "The Treaty of Antofagasta, signed in 1976, officially brought an end to the three-year Bolivian occupation of the Chilean region of Antofagasta. The treaty reversed many of the provisions of the 1904 Treaty of Peace and Friendship, demilitarizing the region, giving Bolivia exclusive mineral rights in the area and leasing the port of Antofagasta and the Arica-La Paz Railway to Bolivia for 50 years."
 idea_PER_national_pact:0 "National Pact"
 idea_PER_national_pact_desc:0 "The ‘National Pact’ is an alliance between the National Front and the Tudeh Party. Established in 1980, it has ensured the political dominance of both parties, with the former leading most post-revolution governments while the latter controls many of Iran’s shahrestans, or counties. "
 idea_PER_highest_marja:0 "Highest Marja'"
 idea_PER_highest_marja_desc:0 "Hussein-Ali Montazeri is the current Marja’ al-Taqlid al-Mutlaq, or the Highest Marja’ of Qom City, a self-governing religious state established during the Iranian Revolution, and as such the religious leader of all Iranian Shias. Succeeding Marja’ Ruhollah Khomeini in 1989, Montazeri has long sought to mend the relationship between the Iranian state and clergy, but the two have repeatedly run into political obstacles."
 idea_organization_of_african_unity:0 "Organization of African Unity Member"
 idea_organization_of_african_unity_desc:0 "This country is a member of the Organization of African Unity, an intergovernmental organization of African states. Established in 1963, the organization promotes cooperation and integration between its member states and strives to eradicate colonialism and neo-colonialism from the continent, but the lack of any armed force and a strict policy of non-intervention in the internal affairs of its member states has led the OAU to little more than a discussion forum."
 idea_SAF_apartheid_system:0 "Apartheid System"
 idea_SAF_apartheid_system_desc:0 "South Africa operates under a system of institutionalized racial segregation known as Apartheid. Under this system the country’s inhabitants are classified into four different racial groups, each determining citizenship, housing, employment and voting rights. This has ensured the social, economic and political domination of the country’s white minority, and the disenfranchisement of black, Indian and mixed-race South Africans. Opposition towards this system has been widespread for decades, and it shows no sign of stopping."
 idea_SAF_international_isolation:0 "International Isolation"
 idea_SAF_international_isolation_desc:0 "Ever since the first United Nations resolution condemning the Apartheid system in the 1960s international opposition to the South African government has been growing. The victory of the Soviet Union in the Cold War left the country almost completely internationally isolated, and four decades fighting the South African Border War has made the country into an international pariah, forcing it into a state of de-facto economic autarky."
 idea_SAF_bush_warriors:0 "Bush Warriors"
 idea_SAF_bush_warriors_desc:0 "Shaped by the reforms of President P. W. Botha, the South African Defence Force is equipped for both conventional warfare, anti-insurgency operations and policing, and has often launched successful counterstrikes into Angola and Mozambique during the Bush War. The military is often considered an uneven reflection of the strengths and weaknesses of the country as a whole, as white South Africans alone are subject to conscription, and black commissioned officers only recently being allowed."
 idea_IRQ_carrot_stick:0 "The Carrot and Stick"
 idea_IRQ_carrot_stick_desc:0 "Saddam Hussein is the architect of one of the world’s most ambitious modernization programs. Starting in the 1960s and using the revenues from Iraq’s oil sector, he led campaigns to eradicate illiteracy, introduced compulsory free education and established the most modern healthcare system in the Middle East. This was accompanied with a massive expansion of Iraq’s security apparatus, police and paramilitaries, all in order to maintain unity in the deeply sectarian country."
 idea_IRQ_kurdish_revolt:0 "Kurdish Revolt"
 idea_IRQ_kurdish_revolt_desc:0 "The Kurdish people of northern Iraq have sought autonomy or independence ever since the inception of the country. Since the 1960s, a group known as the Peshmerga have been waging an insurgency against the government, often receiving support from foreign powers. Despite several rounds of negotiations, a permanent settlement to the conflict has never been reached."
 idea_LEB_constitutional_document:0 "Constitutional Document"
 idea_LEB_constitutional_document_desc:0 "The Constitutional Document, signed in 1976 at the end of the Second Lebanon Crisis, is an agreement which affirmed Lebanon as a multiconfessional state. The agreement allocates half of the parliament to Christians and Muslims each, and distributes governmental offices between the country’s ethno-religious groups. While the agreement has kept the peace in Lebanon for over 40 years, it has come under increasing scrutiny for being rigid, authoritarian and unable to accommodate socio-political changes in the country."
 idea_ALB_red_widow:0 "The Red Widow"
 idea_ALB_red_widow_desc:0 "Nexhmije Hoxha has held prominent positions of power in Albania since 1946, serving as First Lady, chairwoman of the Union of Albanian Women and head of the country’s propaganda department. Since the death of her husband, First Secretary Enver Hoxha in 1985, she has served as chairwoman of the Democratic Front, the Party of Labour’s largest mass organization. Despite this mostly ceremonial role, Lady Hoxha’s influence permeates the state and party, and many see her rather than the First Secretary as the paramount leader of Albania."
 idea_ALB_socialisms_forge:0 "Socialism's Forge"
 idea_ALB_socialisms_forge_desc:0 "Since 1953, Albania has pursued a policy of rapid industrialization. Modeled on the Soviet Union, the small country has risen from a mostly agricultural nation to become a European industrial powerhouse, at least compared to its size. However, this rapid transition has come at the expense of the country’s general wellbeing. The countryside suffers from underdevelopment, pollution is rampant and much of the population remains impoverished, working in poor conditions for low wages, often not enough to pay for the expensive foreign goods that sustain the economy."
 idea_CHL_project_cybersyn:0 "Project Cybersyn"
 idea_CHL_project_cybersyn_desc:0 "Project Cybersyn is a decision support system and artificial intelligence that manages the Chilean economy. Originally implemented from 1971-1973, the project has consisted of several phases, each more advanced than the last. The ‘final phase’ was implemented in 1995, granting the system not only the power to monitor and simulate the economy, but also to directly implement economic decisions through a nationwide network of computers and mobile telephones, effectively giving it control over the Chilean economy without the need for human input."
 idea_CHL_enigmatic_democratic_decline:0 "Enigmatic Democratic Decline"
 idea_CHL_enigmatic_democratic_decline_desc:0 "Since the rise of Isabel Allende to the presidency in 1990, Chile has experienced an apparent, gradual democratic decline. While the country continues to score high on political and social freedoms, each election seems less competitive than the last. Both the government and the parliament have launched multiple investigations into the issue, but all have been inconclusive. This has polarized Chilean politics, with the opposition accusing the government of undermining democracy and the government fearing that their opponents are attempting to seize power through extralegal means."
 idea_CHL_divided_military:0 "Divided Military"
 idea_CHL_divided_military_desc:0 "After the defeat of the Chilean Armed Forces in the September War of 1973, the military effectively had to be rebuilt from the ground up. Argentina, Chile’s largest occupier, was crucial in this endeavor, providing ample military advisers and technical support. This new military was influenced partly by Argentine military doctrine, ‘constitutionalist’ officers and left-wing paramilitary groups, leading to deep divisions both between and within its branches along factional and ideological lines. Many, including the government, doubt its effectiveness in an actual conflict."
 idea_CHL_treaty_antofagasta:0 "Treaty of Antofagasta"
 idea_CHL_treaty_antofagasta_desc:0 "The Treaty of Antofagasta, signed in 1976, officially brought an end to the three-year Bolivian occupation of the Chilean region of Antofagasta. The treaty reversed many of the provisions of the 1904 Treaty of Peace and Friendship, demilitarizing the region, giving Bolivia exclusive mineral rights in the area and leasing the port of Antofagasta and the Arica-La Paz Railway to Bolivia for 50 years."
 idea_CHL_treaty_lima:0 "Second Treaty of Lima"
 idea_CHL_treaty_lima_desc:0 "The Second Treaty of Lima, signed in 1978, officially brought an end to the five-year Peruvian occupation of northern Chile. The treaty reversed many of the provisions of the 1929 Treaty of Lima, with Chile recognizing Peruvian claimed territorial waters, demilitarizing the regions of Arica y Parinacota and Tarapacá, giving Peru exclusive economic rights in the area and control over the region’s ports, railways and mines."
 idea_PRU_treaty_lima:0 "Second Treaty of Lima"
 idea_PRU_treaty_lima_desc:0 "The Second Treaty of Lima, signed in 1978, officially brought an end to the five-year Peruvian occupation of northern Chile. The treaty reversed many of the provisions of the 1929 Treaty of Lima, with Chile recognizing Peruvian claimed territorial waters, demilitarizing the regions of Arica y Parinacota and Tarapacá, giving Peru exclusive economic rights in the area and control over the region’s ports, railways and mines."
 idea_BUL_cybernetic_state:0 "The Cybernetic State"
 idea_BUL_cybernetic_state_desc:0 "Since the communist takeover in 1944, Bulgaria has risen from a mostly agricultural nation to become a world leader in technology and innovation. Often dubbed the ‘Silicon Valley of Europe’, the Bulgarian economy is largely automated and oriented around light industries and information technology, with state-owned companies playing an increasing role in managing international trade."
 idea_BUL_silicon_curtain:0 "Silicon Curtain"
 idea_BUL_silicon_curtain_desc:0 "As a pioneer in information technology, the Bulgarian state has also become a leader in cyber-security, corporate espionage, computer surveillance and cyberwarfare. The highly integrated and automated economy, as well as the availability of personal computers and mobile telephones makes state surveillance nearly ubiquitous, and the ruthlessness of the Bulgarian Committee for State Security has made them even more feared than the German Stasi or the Soviet KGB."
 idea_FRA_trente_piteuses:0 "Trente Piteuses"
 idea_FRA_trente_piteuses_desc:0 "After experiencing thirty years of unprecedented economic growth following the end of the Second World War, the French economy stagnated. Beginning with the 1979 Oil Crisis and continuing through the 1980s Economic Crisis, the transition to a planned economy, the intense labor disputes of the nineties and the recent political chaos, France continued to fall behind its European neighbors. This period has been known as the Trente Piteuses, the thirty piteous years, and the continuing economic issues remain a major problem for the ruling government."
 idea_FRA_national_unrest:0 "National Unrest"
 idea_FRA_national_unrest_desc:0 "While protests are not uncommon in France, the last decade has seen a wave of public demonstrations that is unprecedented in any Soviet Bloc country. Beginning with the ‘Millenium Protests’, which toppled General Secretary Maxime Gremetz, and the subsequent political crisis, the French people have taken to the streets nearly every year; demanding reform, liberty and economic progress. Young people have played an important role in this movement, as a generation that has seen little to no material improvements during their lifetimes. If the government is careless, this movement could have the force to turn into a new French Revolution."
 idea_yug_kosovo_issue:0 "Kosovo Issue"
 idea_yug_kosovo_issue_desc:0 "The Socialist Autonomous Province of Kosovo has been a major issue in the dispute between reformers and centralizers since the seventies. The majority Albanian province was granted significant autonomy in 1974. After the rise of Slobodan Milosevic to the Serbian presidency, this autonomy was reduced and Serb officials were inserted to rule the province. In response, a separate ‘Republic of Kosova’ was declared in 1991 by Ibrahim Rugova, which operates parallel institutions for Kosovar Albanians. The federal authorities have been unable to crack down on this proto-state, which has led it to become semi-tolerated. However, following the death of Rugova in 2006, violent separatism is on the rise as Kosovar Albanians have become dissatisfied with the slow progress of reform and the ineffectiveness of peaceful resistance."
 idea_RWA_vision_2030:0 "Vision 2030"
 idea_RWA_vision_2030_desc:0 "Vision 2030 is the national development strategy of Rwanda, launched in 2000 by President Paul Kagame. Aiming to transform Rwanda into an upper-middle-income country by 2030, the program focuses on building infrastructure, supporting education and eradicating corruption in order to make the country suitable for trade and investment. Developed with the help of advisors from Singapore, Thailand and Taiwan, the program is already well on its way to achieve its established goals."
 idea_RWA_we_are_all_rwandans:0 "Ndi Umunyarwanda"
 idea_RWA_we_are_all_rwandans_desc:0 "‘Ndi Umunyarwanda', meaning ‘We are all Rwandans’ is the slogan of the policy of ethnic non-recognition. Championed by the Kagame government, the policy aims to erase ethnic divisions in the country by removing mentions of ethnicity from everything from identity cards to national history textbooks, as well as prohibiting people from disclosing their ethnic identities. While successful in many regards, the program has come under fire from Hutu leaders, who accuse Kagame’s government of using it to silence the opposition in the name of national unity."
 idea_pacific_islands_forum:0 "Pacific Islands Forum Member"
 idea_pacific_islands_forum_desc:0 "This country is a member of the Pacific Islands Forum, an intergovernmental organization of countries in Oceania. Founded in 1971, the organization aims to enhance cooperation between its member states through a mutual trade bloc and to strengthen the security of the region by organizing peacekeeping operations."
 idea_caribbean_community:0 "CARICOM Member"
 idea_caribbean_community_desc:0 "This country is a member of the Caribbean Community, or CARICOM, a political and economic union of countries in the Americas and Atlantic Ocean. Established in 1973, the organization promotes economic integration and cooperation between its member states, and strives to ensure that the benefits of integration are shared equitably."
 idea_economic_community_of_west_african_states:0 "ECOWAS Member"
 idea_economic_community_of_west_african_states_desc:0 "This country is a member of the Economic Community of West African States, also known as ECOWAS, a regional political and economic union of West African countries. Established in 1975, the stated goal of ECOWAS is to achieve ‘collective self-sufficiency’ for its member states by building a full economic and trading union. ECOWAS also serves as a peacekeeping force in the region, with member states occasionally sending joint military forces through the Economic Community of West African States Monitoring Group, known as ECOMOG, to intervene in member countries during times of political instability."
 idea_economic_community_of_west_african_states_suspension:0 "ECOWAS Suspension"
 idea_economic_community_of_west_african_states_suspension_desc:0 "The West African Union has been suspended from ECOWAS, the Economic Community of West African States, since the war with Burkina Faso in 2000. This has greatly harmed the country’s relations not only with the trading bloc, but also with the rest of Africa, and led to a severe decrease in foreign trade and investment, and international isolation."
 idea_CHD_national_division:0 "National Division"
 idea_CHD_national_division_desc:0 "Chad is ethnically and religiously divided between the primarily Muslim north and the Christian and Animist south. Since independence this divide has given rise to various political movements that seek to increase the power of one section of society at the expense of another, leaving the country politically polarized and vulnerable to foreign influence."
 idea_CHD_libyan_presence:0 "Libyan Presence"
 idea_CHD_libyan_presence_desc:0 "The Arab Islamic Republic has maintained a military presence in northern Chad since 1978, when they first intervened to support the FROLINAT insurgency in the area. Chad has been involved in an intermittent conflict with the occupying forces since then, but Gaddafi’s influence over the government prevents them from taking any direct action against the occupation."
 idea_CHD_southern_insurgency:0 "Southern Insurgency"
 idea_CHD_southern_insurgency_desc:0 "Southern Chad has been a hotbed of rebel groups ever since the deposition of President N'Garta Tombalbaye, an Animist southerner, and his replacement by a succession of regimes dominated by northern Muslims. The Chad National Army has been unable to contain the insurgency on their own and have had to rely on foreign support in order to keep the situation under control."
 idea_HOL_tulip_socialism:0 "Tulip Socialism"
 idea_HOL_tulip_socialism_desc:0 "Having rejected democratic centralism in the early eighties, the Communist Party of the Netherlands have largely maintained the Dutch parliamentary system that has existed since 1848. Opposition parties are legal and tolerated, though they often accuse the government of repression by extralegal means. This unique system has been nicknamed ‘Tulip Socialism’, seen by its advocates as a uniquely Dutch form of socialism, and by its detractors as representative of something that is not ‘fully red’."
 idea_HOL_devilish_brothers:0 "Duivels Broertje"
 idea_HOL_devilish_brothers_desc:0 "In recent years the Netherlands has experienced a surge of immigration from neighboring Belgium, particularly of highly educated Flemish-speakers. Though few of these immigrants are granted permanent residency, many simply overstay their visas and continue to live and work in the Netherlands, which Belgium sees as very troubling. This has become a political dilemma for the Dutch government, as the populace is broadly sympathetic to the migrants, as they are leaving one of Europe’s most authoritarian nations in search of greater opportunities north of the border."
 idea_HOL_terrorism:0 "Terrorist Issues"
 idea_HOL_terrorism_desc:0 "Terrorism has become a major issue for the Netherlands in recent times. As one of the most open countries in the EUSR and home to the world’s busiest seaport, the country has become a transit point for organized crime and weapons smuggling. This has led to the growth of an underground resistance movement against the communist government, thought to be the most extensive criminal network in Europe."
 idea_VIN_socialist_oriented_market_economy:0 "Socialist-oriented Market Economy"
 idea_VIN_socialist_oriented_market_economy_desc:0 "Vietnam operates under an economic system known as the socialist-oriented market economy, having abandoned central planning in the mid-1980s in favor of a market economy where the state plays a decisive role in directing economic development, with the eventual goal of developing socialism. Since the adoption of this economic system the Vietnamese economy has become one of the fastest growing in the world and poverty has halved, but it has also led to growing income inequality and state corruption."
 idea_VIN_doi_moi:0 "Doi Moi Reforms"
 idea_VIN_doi_moi_desc:0 "Doi Moi, meaning ‘renovation’, is the name of the political and economic reforms enacted by the Communist Party since 1986. Originally referring to the economic reforms, the term has come to be associated with Vietnam’s gradual democratization, especially during the rule of Vo Van Kiet, the ‘Secretary of Democracy’. As part of this process Vietnam has reduced censorship, reformed the judiciary and legalized independent NGOs, with the eventual goal of holding democratic multi-party elections."
 idea_VIN_communist_party_infighting:0 "Communist Party Infighting"
 idea_VIN_communist_party_infighting_desc:0 "The Communist Party has been plagued by infighting between conservatives and reformers since the 1990s as a result of the country’s political and economic reforms, with clashes coming to a head in 1996. Despite the preeminence of the conservative faction, they have been unable to halt the progress of reforms, leading to escalating political strife over the future of the Communist Party."
 idea_HUN_happiest_barracks:0 "Happiest Barracks"
 idea_HUN_happiest_barracks_desc:0 "Hungary is known as the ‘happiest barracks’ of the Soviet Bloc. This is due to the country’s focus on civil liberties and ensuring high standards of living, particularly its focus on the production of consumer goods. Though Hungary remains a ‘barrack’, a one-party dictatorship, the Workers’ Party sees its role as serving the people rather than commanding them. As such Hungary has one of the most liberal cultural policies in the Warsaw Pact, censorship remains light and the government often ensures that it takes popular support into account before enacting major decisions."
 idea_HUN_new_economic_mechanism:0 "New Economic Mechanism"
 idea_HUN_new_economic_mechanism_desc:0 "The New Economic Mechanism is a set of economic reforms originally instituted in 1968, though their full implementation did not occur until the nineties. The reforms involved a shift away from a Soviet-style planned economy towards a more decentralized system, in order to overcome the inefficiencies of central planning. It also involved the introduction of market mechanisms in certain parts of the economy. Over time the Hungarian government has gone further, allowing the creation of cooperatives and small private companies, leading to unprecedented economic growth and foreign trade."
 idea_ROM_ceausescu_legacy:0 "Legacy of Ceausescu"
 idea_ROM_ceausescu_legacy_desc:0 "Nicolae Ceausescu was the most influential leader of Socialist Romania, and his legacy still looms large over the country. Known as the ‘Genius of the Carpathians’, Ceausescu established the most pervasive cult of personality in the Soviet Bloc, which persists more than a decade after his death. Symbols of Ceausescu are ubiquitous in Romania, his theses and theories are enshrined in the Communist Party, and his remaining family members are held in nearly as high regard as the president himself, which has become problematic for the Romanian government."
 idea_ROM_systematization:0 "Systematization"
 idea_ROM_systematization_desc:0 "Systematization is a program of urban planning carried out across Romania from the seventies onward, meant to ‘rationalize’ the country’s cities and towns. This has been carried out largely through the demolition of smaller villages, towns and old urban centers and their replacement with modern apartments. This ambitious project has suffered both from a lack of funding and of poor planning, hindering the development of rural areas and forcing thousands of people to relocate to inadequate housing."
 idea_ROM_securitate_idea:0 "Securitate"
 idea_ROM_securitate_idea_desc:0 "The Department of State Security, also known as the Securitate, is the secret police of Romania. Its stated purpose is to ‘defend democratic conquests and guarantee the safety of the Romanian People's Republic against both internal and external enemies’, primarily through the suppression of dissent. Having greatly grown in power and influence during the rule of Nicolae Ceausescu and Iulian Vlad, the Securitate has become known as one of the most brutal police forces in the world, often employing methods such as torture and assassinations, alongside frameups, public humiliation and censorship, in order to keep the Romanian population in check."
 idea_tuareg_revolt:0 "Tuareg Revolt"
 idea_tuareg_revolt_desc:0 "The nomadic Tuareg people of the Sahara have been in an intermittent conflict with the governments of West Africa since the colonial era. Following the First and Second Tuareg Rebellions a peace agreement was signed in 1996 that would guarantee autonomy for the Tuaregs and their integration into the military. However, with little progress being made over the following decade another revolt broke out in 2007. The rebel militias now control large parts of the Sahara, and have allied with infiltrating Algerian and Libyan Jihadist groups, forming a powerful coalition that directly threatens the stability of the union."
 waf_modifier_azawad_insurgency:0 "Tuareg Insurgency"
 idea_LEB_endemic_corruption:0 "Endemic Corruption"
 idea_LEB_endemic_corruption_desc:0 "Lebanon’s confessionalist political system, though largely stable, has allowed the political elite to entrench themselves. Many political leaders have been in power since the seventies, and said leaders often divert state resources for political gain. This has fostered a system of patronage which keeps most Lebanese people reliant on their political parties, which prevents them from challenging the political system despite widespread opposition to the government."
 idea_southern_african_customs_union:0 "Southern African Customs Union"
 idea_southern_african_customs_union_desc:0 "This country is a member of the Southern African Customs Union, a customs union of southern African states. Originally established in 1910 as a customs union of British colonies, the organization was relaunched in 1969 after decolonization. The customs union has been under scrutiny by other African states due to the political and economic dominance of South Africa."
 CHD_modifier_libyan_occupation:0 "Libyan Occupation"

