 idea_apc_political_deadlock:0 "Political Deadlock"
 idea_apc_political_deadlock_desc:0 "The American People’s Commonwealth has since its foundation been plagued by political deadlock stemming from the factional divide between the Old Guard, socialist activists and moderates who led the Second American Revolution, and the New Guard, young and pragmatic politicians who rose to power during the three year-long constitutional convention of 1990. Each faction controls different parts of the commonwealth government, making passing any meaningful legislation nearly impossible."
 idea_apc_appalling_recognition:0 "Appalling Recognition"
 idea_apc_appalling_recognition_desc:0 "The American People’s Commonwealth is the least internationally recognized state in the former US, with the exception of the Union of Lincoln. Our support for true socialism in opposition to the Soviet Union have made us few friends in the international community, making foreign trade and bilateral relations difficult."
 idea_apc_western_corruption:0 "Western Corruption"
 idea_apc_western_corruption_desc:0 "The Trade Councils are the economic and political bedrock of the American People’s Commonwealth. The western states in particular are dominated by the Agricultural and Automotive Councils, based in Chicago and Detroit respectively. Whether Old or New Guard, no one west of the Ohio River is elected to political office without their support, and not even the president has been able to make a move against them."
